<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EatWhat - AI 食物热量分析</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="nav-bar">
        <div class="nav-inner">
            <h1 class="nav-title">EatWhat</h1>
            <button class="nav-settings-btn" id="settingsBtn" title="设置 API 密钥">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- API 密钥设置弹窗 -->
    <div id="apiKeyModal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2>欢迎使用 EatWhat</h2>
            <p>使用此应用需要 Google Gemini API 密钥</p>
            <ol>
                <li>访问 <a href="https://makersuite.google.com/app/apikey" target="_blank">Google AI Studio</a></li>
                <li>创建或登录您的 Google 账号</li>
                <li>点击"创建 API 密钥"</li>
                <li>复制密钥并粘贴到下方</li>
            </ol>
            <input type="password" id="apiKeyInput" placeholder="请输入您的 Gemini API 密钥">
            <button id="saveApiKeyBtn" class="btn btn-primary">保存 API 密钥</button>
            <p class="note">您的 API 密钥仅存储在浏览器本地，不会发送到我们的服务器</p>
        </div>
    </div>

    <!-- 主要内容 -->
    <main class="main-layout">
        <!-- 左侧主内容 -->
        <div class="main-column">
            <!-- 上传区域 -->
            <section class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
                    <div class="upload-placeholder">
                        <div class="upload-icon-wrap">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="3"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <path d="M21 15l-5-5L5 21"/>
                            </svg>
                        </div>
                        <h3>上传食物照片</h3>
                        <p>拖拽图片到此处，或点击选择</p>
                        <button class="btn btn-secondary" id="uploadBtn">选择照片</button>
                        <p class="upload-hint">支持 JPG、PNG、WEBP 格式（最大 10MB）</p>
                    </div>
                </div>

                <!-- 图片预览 -->
                <div class="preview-section" id="previewSection" style="display: none;">
                    <div class="preview-container">
                        <img id="previewImage" src="" alt="预览">
                        <button class="btn-remove" id="removeImage">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <div class="preview-actions">
                        <button class="btn btn-primary btn-lg" id="analyzeBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                            分析食物
                        </button>
                    </div>
                </div>

                <!-- 加载状态 -->
                <div class="loading-section" id="loadingSection" style="display: none;">
                    <div class="loading-ring">
                        <div class="loading-ring-inner"></div>
                    </div>
                    <p>正在分析您的餐点...</p>
                    <p class="loading-hint">这可能需要几秒钟</p>
                </div>

                <!-- 错误消息 -->
                <div class="error-message" id="errorMessage" style="display: none;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <p id="errorText"></p>
                    <button class="btn btn-secondary" id="retryBtn">重试</button>
                </div>
            </section>

            <!-- 结果区域 -->
            <section class="results-section" id="resultsSection" style="display: none;">
                <div class="results-header">
                    <h2>分析结果</h2>
                    <button class="btn btn-ghost" id="newAnalysisBtn">新的分析</button>
                </div>

                <div class="results-card">
                    <div class="total-calories">
                        <span class="calories-value" id="totalCalories">0</span>
                        <span class="calories-label">千卡</span>
                    </div>

                    <div class="food-list" id="foodList"></div>

                    <div class="results-actions">
                        <button class="btn btn-primary" id="saveToHistoryBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                                <polyline points="17 21 17 13 7 13 7 21"/>
                                <polyline points="7 3 7 8 15 8"/>
                            </svg>
                            保存到历史
                        </button>
                    </div>
                </div>
            </section>
        </div>

        <!-- 右侧历史边栏 -->
        <aside class="history-sidebar" id="historySidebar">
            <div class="history-header">
                <h2>餐点历史</h2>
                <button class="btn-icon-only" id="clearHistoryBtn" title="清除所有历史">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
            </div>

            <div class="history-stats" id="historyStats">
                <div class="stat-card">
                    <span class="stat-label">今天</span>
                    <span class="stat-value" id="todayCalories">0 <small>千卡</small></span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">本周</span>
                    <span class="stat-value" id="weekCalories">0 <small>千卡</small></span>
                </div>
            </div>

            <div class="history-list" id="historyList">
                <div class="empty-history">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <p>还没有记录任何餐点</p>
                </div>
            </div>
        </aside>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/gemini.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
